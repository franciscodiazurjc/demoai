<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProjectPulse – Fachada Atocha</title>

<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        background: #f3f4f6;
    }

    /* Panel lateral */
    #sidebar {
        width: 340px;
        background: white;
        padding: 20px;
        box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        overflow-y: auto;
    }

    #sidebar h2 { margin-top: 20px; }

    label {
        font-size: 14px;
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }

    textarea {
        width: 100%;
        height: 90px;
        resize: none;
        padding: 8px;
        margin-top: 6px;
        font-size: 14px;
    }

    input[type="range"] {
        width: 100%;
        margin-top: 10px;
    }

    #avanceValor {
        font-weight: bold;
        font-size: 14px;
    }

    /* Imagen principal */
    #main {
        position: relative;
        flex: 1;
        overflow: hidden;
    }

    .image-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
    }

    #fachada {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Logo Ineco */
    #logo-ineco {
        position: absolute;
        top: 15px;
        right: 20px;
        width: 140px;
        background: rgba(255,255,255,0.85);
        padding: 6px 10px;
        border-radius: 8px;
        z-index: 10;
    }

    /* Zonas clicables (sin resaltado) */
    .zona {
        position: absolute;
        border: 2px solid transparent;
        cursor: pointer;
    }

    .zona-label {
        position: absolute;
        background: rgba(0,0,0,0.55);
        color: white;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 12px;
        pointer-events: none;
    }

    /* Zona seleccionada */
    .zona-activa {
        border: 2px solid #2563eb;
    }
</style>
</head>

<body>

<!-- Panel lateral -->
<div id="sidebar">
    <h1>Proyecto: Fachada Atocha</h1>
    <p>Haz clic en una zona de la imagen para editar su avance.</p>

    <h2>Zona seleccionada</h2>
    <div id="zonaSeleccionada" style="font-size:16px; font-weight:bold; margin-bottom:10px;">
        Ninguna
    </div>

    <label>Comentario del PM</label>
    <textarea id="comentario"></textarea>

    <label>Avance: <span id="avanceValor">0%</span></label>
    <input type="range" id="avanceSlider" min="0" max="100" value="0">
</div>

<!-- Zona principal -->
<div id="main">
    <div class="image-wrapper">

        <!-- Logo Ineco -->
        <img id="logo-ineco"
             src="https://www.ineco.com/ineco/sites/default/files/2022-12/Logo%20Ineco.png"
             alt="Logo Ineco">

        <!-- Imagen de la fachada -->
        <img id="fachada"
             src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Fachada_de_1892_de_la_Estaci%C3%B3n_de_Atocha%2C_de_Madrid%2C_Espa%C3%B1a.JPG"
             alt="Fachada Estación de Atocha">

        <!-- Zonas clicables -->
        <div class="zona" data-zona="Cubierta metálica"
             style="top: 5%; left: 10%; width: 80%; height: 18%;"></div>
        <div class="zona-label" style="top: 4%; left: 12%;">Cubierta metálica</div>

        <div class="zona" data-zona="Arco y vidrieras"
             style="top: 23%; left: 18%; width: 64%; height: 32%;"></div>
        <div class="zona-label" style="top: 22%; left: 20%;">Arco y vidrieras</div>

        <div class="zona" data-zona="Entrada principal"
             style="top: 55%; left: 30%; width: 40%; height: 20%;"></div>
        <div class="zona-label" style="top: 54%; left: 32%;">Entrada principal</div>

        <div class="zona" data-zona="Alas laterales"
             style="top: 35%; left: 3%; width: 94%; height: 40%;"></div>
        <div class="zona-label" style="top: 34%; left: 6%;">Alas laterales</div>

        <div class="zona" data-zona="Ornamentación superior"
             style="top: 15%; left: 35%; width: 30%; height: 15%;"></div>
        <div class="zona-label" style="top: 14%; left: 37%;">Ornamentación superior</div>

    </div>
</div>

<script>
    const zonas = document.querySelectorAll('.zona');
    const zonaSeleccionada = document.getElementById('zonaSeleccionada');
    const comentario = document.getElementById('comentario');
    const avanceSlider = document.getElementById('avanceSlider');
    const avanceValor = document.getElementById('avanceValor');

    // Memoria de datos por zona
    const datosZonas = {};

    let zonaActiva = null;

    zonas.forEach(z => {
        z.addEventListener('click', () => {
            if (zonaActiva) zonaActiva.classList.remove('zona-activa');

            zonaActiva = z;
            zonaActiva.classList.add('zona-activa');

            const nombre = z.dataset.zona;
            zonaSeleccionada.textContent = nombre;

            comentario.value = datosZonas[nombre]?.comentario || "";
            avanceSlider.value = datosZonas[nombre]?.avance || 0;
            avanceValor.textContent = avanceSlider.value + "%";
        });
    });

    comentario.addEventListener('input', () => {
        if (!zonaActiva) return;
        const nombre = zonaActiva.dataset.zona;
        datosZonas[nombre] = datosZonas[nombre] || {};
        datosZonas[nombre].comentario = comentario.value;
    });

    avanceSlider.addEventListener('input', () => {
        if (!zonaActiva) return;
        const nombre = zonaActiva.dataset.zona;
        datosZonas[nombre] = datosZonas[nombre] || {};
        datosZonas[nombre].avance = avanceSlider.value;
        avanceValor.textContent = avanceSlider.value + "%";
    });
</script>

</body>
</html>
