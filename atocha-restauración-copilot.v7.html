<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atocha Restauración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        .sidebar {
            width: 250px;
            background: #282c34;
            color: white;
            position: fixed;
            height: 100%;
            padding: 20px;
            transition: width 0.3s;
        }
        .sidebar .card {
            background: #3a3f47;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .progress {
            background: #eeeeee;
            border-radius: 5px;
            overflow: hidden;
            height: 20px;
            margin: 10px 0;
            transition: background-color 0.3s;
        }
        .progress .bar {
            height: 100%;
            transition: width 0.5s ease-in-out;
        }
        .highlight {
            background-color: #ffdf7e;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .legend {
            margin-top: 20px;
        }
        .legend span {
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Atocha Restauración</h2>
        <div class="card">
            <h3>Zone Statistics</h3>
            <div class="progress highlight">
                <div class="bar" style="width: 70%; background: linear-gradient(to right, #4caf50, #81c784);"></div>
            </div>
            <div class="legend">
                <span><div class="status-indicator" style="background-color: #4caf50;"></div> Zone 1 - Active</span>
                <span><div class="status-indicator" style="background-color: #ff9800;"></div> Zone 2 - In Progress</span>
                <span><div class="status-indicator" style="background-color: #f44336;"></div> Zone 3 - Inactive</span>
            </div>
        </div>
    </div>
    <div class="content" style="margin-left: 260px; padding: 20px;">
        <h1>Restoration Progress</h1>
        <p>Visual enhancements applied successfully. All existing functionality remains intact.</p>
    </div>
    <script>
        // JavaScript functions for animations and interactions can be added here
    </script>
</body>
</html>
