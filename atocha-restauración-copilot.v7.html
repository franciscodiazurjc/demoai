<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DEMO AI para Dirección de Proyectos</title>

<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        background: #f3f4f6;
    }

    /* Panel lateral */
    #sidebar {
        width: 360px;
        background: white;
        padding: 20px;
        box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        overflow-y: auto;
        z-index: 5;
    }

    #sidebar h2 { margin-top: 20px; }

    label {
        font-size: 14px;
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }

    textarea {
        width: 100%;
        height: 90px;
        resize: none;
        padding: 8px;
        margin-top: 6px;
        font-size: 14px;
    }

    input[type="range"] {
        width: 100%;
        margin-top: 10px;
    }

    #avanceValor {
        font-weight: bold;
        font-size: 14px;
    }

    /* Imagen principal */
    #main {
        position: relative;
        flex: 1;
        overflow: hidden;
    }

    .image-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s ease;
    }

    #fachada {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
    }

    /* Logo Ineco */
    #logo-ineco {
        position: absolute;
        top: 15px;
        right: 20px;
        width: 140px;
        background: rgba(255,255,255,0.85);
        padding: 6px 10px;
        border-radius: 8px;
        z-index: 10;
    }

    /* Avance global */
    #avanceGlobal {
        position: absolute;
        top: 15px;
        left: 20px;
        background: rgba(0,0,0,0.65);
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        z-index: 10;
    }

    /* Zonas clicables */
    .zona {
        position: absolute;
        border: 2px solid transparent;
        cursor: pointer;
    }

    /* Lupas */
    .lupa {
        position: absolute;
        width: 32px;
        height: 32px;
        background: rgba(255,255,255,0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
        border: 1px solid #ccc;
        z-index: 20;
        transition: transform 0.2s ease;
    }

    .lupa:hover {
        transform: scale(1.15);
    }

    /* Listado de comentarios */
    #resumenZonas {
        margin-top: 20px;
        padding: 10px;
        background: #eef2ff;
        border-radius: 8px;
    }

    #resumenZonas h3 {
        margin-top: 0;
    }

    .item-zona {
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #c7d2fe;
    }
</style>
</head>

<body>

<!-- Panel lateral -->
<div id="sidebar">
    <h1>DEMO AI para Dirección de Proyectos</h1>
    <p>Haz clic en una zona o en su lupa para editar su avance.</p>

    <h2>Zona seleccionada</h2>
    <div id="zonaSeleccionada" style="font-size:16px; font-weight:bold; margin-bottom:10px;">
        Ninguna
    </div>

    <label>Comentario del PM</label>
    <textarea id="comentario"></textarea>

    <label>Avance: <span id="avanceValor">0%</span></label>
    <input type="range" id="avanceSlider" min="0" max="100" value="0">

    <div id="resumenZonas">
        <h3>Resumen de zonas</h3>
        <div id="listaResumen"></div>
    </div>
</div>

<!-- Zona principal -->
<div id="main">
    <div class="image-wrapper" id="zoomWrapper">

        <!-- Avance global -->
        <div id="avanceGlobal">Avance global: 0%</div>

        <!-- Logo Ineco -->
        <img id="logo-ineco"
             src="https://www.ineco.com/ineco/sites/default/files/2022-12/Logo%20Ineco.png"
             alt="Logo Ineco">

        <!-- Imagen de la fachada -->
        <img id="fachada"
             src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Fachada_de_1892_de_la_Estaci%C3%B3n_de_Atocha%2C_de_Madrid%2C_Espa%C3%B1a.JPG"
             alt="Fachada Estación de Atocha">

        <!-- Zonas clicables + lupas recolocadas -->
        <div class="zona" data-zona="Cubierta metálica"
             style="top: 5%; left: 10%; width: 80%; height: 18%;"></div>
        <div class="lupa" data-zona="Cubierta metálica"
             style="top: 12%; left: 48%;">🔍</div>

        <div class="zona" data-zona="Arco y vidrieras"
             style="top: 23%; left: 18%; width: 64%; height: 32%;"></div>
        <div class="lupa" data-zona="Arco y vidrieras"
             style="top: 37%; left: 48%;">🔍</div>

        <div class="zona" data-zona="Entrada principal"
             style="top: 55%; left: 30%; width: 40%; height: 20%;"></div>
        <div class="lupa" data-zona="Entrada principal"
             style="top: 63%; left: 48%;">🔍</div>

        <div class="zona" data-zona="Alas laterales"
             style="top: 35%; left: 3%; width: 94%; height: 40%;"></div>
        <div class="lupa" data-zona="Alas laterales"
             style="top: 52%; left: 50%;">🔍</div>

        <div class="zona" data-zona="Ornamentación superior"
             style="top: 15%; left: 35%; width: 30%; height: 15%;"></div>
        <div class="lupa" data-zona="Ornamentación superior"
             style="top: 20%; left: 50%;">🔍</div>

    </div>
</div>

<script>
    const zonas = document.querySelectorAll('.zona');
    const lupas = document.querySelectorAll('.lupa');
    const zonaSeleccionada = document.getElementById('zonaSeleccionada');
    const comentario = document.getElementById('comentario');
    const avanceSlider = document.getElementById('avanceSlider');
    const avanceValor = document.getElementById('avanceValor');
    const avanceGlobal = document.getElementById('avanceGlobal');
    const listaResumen = document.getElementById('listaResumen');
    const zoomWrapper = document.getElementById('zoomWrapper');

    const datosZonas = {};
    let zonaActiva = null;

    function seleccionarZona(nombre, top, left) {
        zonaActiva = nombre;
        zonaSeleccionada.textContent = nombre;

        comentario.value = datosZonas[nombre]?.comentario || "";
        avanceSlider.value = datosZonas[nombre]?.avance || 0;
        avanceValor.textContent = avanceSlider.value + "%";

        // Zoom real hacia la zona
        zoomWrapper.style.transformOrigin = `${left}% ${top}%`;
        zoomWrapper.style.transform = "scale(1.8)";
    }

    function actualizarResumen() {
        listaResumen.innerHTML = "";
        let total = 0;
        let count = 0;

        for (const zona in datosZonas) {
            const data = datosZonas[zona];
            if (data.avance !== undefined) {
                total += Number(data.avance);
                count++;
            }

            const div = document.createElement("div");
            div.className = "item-zona";
            div.innerHTML = `
                <strong>${zona}</strong><br>
                Avance: ${data.avance || 0}%<br>
                Comentario: ${data.comentario || "Sin comentarios"}
            `;
            listaResumen.appendChild(div);
        }

        const global = count > 0 ? Math.round(total / count) : 0;
        avanceGlobal.textContent = "Avance global: " + global + "%";
    }

    zonas.forEach(z => {
        z.addEventListener('click', () => {
            const rect = z.getBoundingClientRect();
            const top = ((rect.top + rect.height/2) / window.innerHeight) * 100;
            const left = ((rect.left + rect.width/2) / window.innerWidth) * 100;
            seleccionarZona(z.dataset.zona, top, left);
        });
    });

    lupas.forEach(l => {
        l.addEventListener('click', () => {
            const rect = l.getBoundingClientRect();
            const top = ((rect.top + rect.height/2) / window.innerHeight) * 100;
            const left = ((rect.left + rect.width/2) / window.innerWidth) * 100;
            seleccionarZona(l.dataset.zona, top, left);
        });
    });

    comentario.addEventListener('input', () => {
        if (!zonaActiva) return;
        datosZonas[zonaActiva] = datosZonas[zonaActiva] || {};
        datosZonas[zonaActiva].comentario = comentario.value;
        actualizarResumen();
    });

    avanceSlider.addEventListener('input', () => {
        if (!zonaActiva) return;
        datosZonas[zonaActiva] = datosZonas[zonaActiva] || {};
        datosZonas[zonaActiva].avance = avanceSlider.value;
        avanceValor.textContent = avanceSlider.value + "%";
        actualizarResumen();
    });

    // Reset zoom al hacer clic fuera
    document.addEventListener('click', (e) => {
        if (!e.target.classList.contains('lupa') &&
            !e.target.classList.contains('zona')) {
            zoomWrapper.style.transform = "scale(1)";
        }
    });
</script>

</body>
</html>
