<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ineco | Heritage Inspector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body { background: #010409; color: #e6edf3; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        .facade-container {
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        .facade-img { max-height: 75vh; display: block; filter: brightness(0.6); transition: 0.5s; }
        .facade-img.active { filter: brightness(0.4) blur(2px); }

        /* Puntos de interés (Hotspots) */
        .hotspot {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(34, 211, 238, 0.6);
            border: 2px solid #22d3ee;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 10;
        }
        .hotspot:hover { transform: scale(1.3); background: #22d3ee; box-shadow: 0 0 20px #22d3ee; }
        .hotspot::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #22d3ee; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .glass-sidebar {
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid #30363d;
            transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-open { transform: translateX(0); }

        textarea { background: #0d1117; border: 1px solid #30363d; color: #8b949e; }
        textarea:focus { border-color: #22d3ee; outline: none; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-6 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center gap-4">
            <div class="h-10 w-1 bg-cyan-500"></div>
            <div>
                <h1 class="text-xl font-bold tech-font tracking-widest text-white">ATOCHA 1892 <span class="text-cyan-500">AUDIT</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Dirección de Proyectos de Patrimonio - VibeCoding</p>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase">Avance Real Consolidado</p>
                <p id="global-perc" class="text-3xl font-bold tech-font text-cyan-400">0%</p>
            </div>
            <img src="https://www.ineco.com/ineco/sites/default/files/2022-12/Logo%20Ineco.png" alt="Ineco" class="h-10 brightness-0 invert">
        </div>
    </nav>

    <main class="flex flex-1 relative overflow-hidden">
        
        <div class="flex-1 flex items-center justify-center p-10 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:20px_20px]">
            <div class="facade-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Fachada_de_1892_de_la_Estaci%C3%B3n_de_Atocha%2C_de_Madrid%2C_Espa%C3%B1a.JPG" id="facade" class="facade-img">
                
                <div class="hotspot" style="top: 15%; left: 50%;" onclick="openInspector('centro')"><i class="fas fa-plus text-[10px]"></i></div>
                <div class="hotspot" style="top: 45%; left: 20%;" onclick="openInspector('izq')"><i class="fas fa-plus text-[10px]"></i></div>
                <div class="hotspot" style="top: 45%; left: 80%;" onclick="openInspector('der')"><i class="fas fa-plus text-[10px]"></i></div>
                <div class="hotspot" style="top: 85%; left: 50%;" onclick="openInspector('base')"><i class="fas fa-plus text-[10px]"></i></div>
            </div>
        </div>

        <div id="sidebar" class="w-96 glass-sidebar fixed right-0 top-0 h-full p-8 z-50 flex flex-col shadow-2xl">
            <button onclick="closeInspector()" class="text-slate-500 hover:text-white mb-8"><i class="fas fa-arrow-right mr-2"></i> Volver al plano</button>
            
            <h2 id="side-title" class="text-2xl font-bold tech-font text-cyan-400 mb-2 uppercase">Zona</h2>
            <p id="side-desc" class="text-xs text-slate-500 mb-8 font-light italic">Descripción técnica de la zona seleccionada.</p>

            <div class="space-y-8">
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-4 tracking-widest">Grado de Avance</label>
                    <input type="range" id="side-slider" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer" oninput="updateZoneProgress(this.value)">
                    <div class="flex justify-between mt-2 font-bold tech-font">
                        <span class="text-slate-600 text-xs">ACTUAL:</span>
                        <span id="side-perc" class="text-cyan-400 text-xl">0%</span>
                    </div>
                </div>

                <div class="flex-1">
                    <label class="block text-xs uppercase text-slate-400 mb-4 tracking-widest">Comentarios del PM</label>
                    <textarea id="side-notes" class="w-full h-48 p-4 rounded-xl text-sm" placeholder="Introduzca observaciones sobre el avance, materiales o riesgos detectados..."></textarea>
                </div>
            </div>

            <div class="mt-auto">
                <button onclick="closeInspector()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                    GUARDAR CAMBIOS
                </button>
            </div>
        </div>
    </main>

    <script>
        const projectData = {
            centro: { title: "Frontón y Esculturas", desc: "Grupo escultórico de piedra y reloj central de 1892.", progress: 0, notes: "" },
            izq: { title: "Pabellón Lateral Izquierdo", desc: "Fábrica de ladrillo y ventanales de la zona Este.", progress: 0, notes: "" },
            der: { title: "Pabellón Lateral Derecho", desc: "Fábrica de ladrillo y acceso a oficinas zona Oeste.", progress: 0, notes: "" },
            base: { title: "Zócalo y Basamento", desc: "Estructura inferior de piedra y accesos de carruajes.", progress: 0, notes: "" }
        };

        let currentZone = '';

        function openInspector(zone) {
            currentZone = zone;
            const data = projectData[zone];
            
            document.getElementById('side-title').innerText = data.title;
            document.getElementById('side-desc').innerText = data.desc;
            document.getElementById('side-slider').value = data.progress;
            document.getElementById('side-perc').innerText = data.progress + '%';
            document.getElementById('side-notes').value = data.notes;

            document.getElementById('sidebar').classList.add('sidebar-open');
            document.getElementById('facade').classList.add('active');
        }

        function closeInspector() {
            if(currentZone) {
                projectData[currentZone].notes = document.getElementById('side-notes').value;
            }
            document.getElementById('sidebar').classList.remove('sidebar-open');
            document.getElementById('facade').classList.remove('active');
            updateGlobal();
        }

        function updateZoneProgress(val) {
            projectData[currentZone].progress = parseInt(val);
            document.getElementById('side-perc').innerText = val + '%';
        }

        function updateGlobal() {
            const values = Object.values(projectData).map(z => z.progress);
            const avg = Math.round(values.reduce((a,b) => a + b, 0) / values.length);
            document.getElementById('global-perc').innerText = avg + '%';
        }
    </script>
</body>
</html>
