<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ineco | Auditoría Patrimonio Atocha 1892</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap');
        
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        /* Contenedor de la Fachada */
        .facade-wrapper {
            position: relative;
            width: fit-content;
            margin: auto;
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .main-img {
            max-height: 70vh;
            display: block;
            filter: saturate(0.5) brightness(0.8);
        }

        /* Capas de Color (Overlays) */
        .zone {
            position: absolute;
            pointer-events: none;
            mix-blend-mode: color-dodge;
            transition: opacity 0.3s ease;
            background-color: #22d3ee;
            opacity: 0;
        }

        /* Coordenadas precisas basadas en la imagen de 1892 */
        #z-centro { top: 0%; left: 35%; width: 30%; height: 40%; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); } /* Frontón triangular */
        #z-arcos  { top: 40%; left: 0%; width: 100%; height: 40%; } /* Cuerpo de arcos lateral */
        #z-vidrio { top: 15%; left: 15%; width: 70%; height: 25%; border-radius: 50% 50% 0 0; } /* El arco de cristal */
        #z-base   { top: 80%; left: 0%; width: 100%; height: 20%; } /* Nivel suelo */

        .control-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type=range] { accent-color: #22d3ee; cursor: pointer; }
    </style>
</head>
<body class="p-8">

    <header class="flex justify-between items-end mb-8 border-b border-white/10 pb-4">
        <div>
            <h1 class="text-3xl font-black tech-font text-white tracking-tighter">ATOCHA 1892 <span class="text-cyan-500">HERITAGE</span></h1>
            <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest">Revisión Técnica de Fachada Histórica - Vibecoding Demo</p>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-slate-500 uppercase tracking-widest">Estado de Restauración</div>
            <div id="global-perc" class="text-5xl font-bold tech-font text-cyan-400">0%</div>
        </div>
    </header>

    <div class="flex gap-8 h-[75vh]">
        <div class="w-80 flex flex-col gap-4">
            <div class="control-card p-6 rounded-2xl flex-1 overflow-y-auto">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-6 tracking-widest">Zonas de Interés</h3>
                
                <div class="space-y-8">
                    <div>
                        <label class="text-xs block mb-2 font-semibold">Frontón y Esculturas</label>
                        <input type="range" class="w-full slider" oninput="update('centro', this.value)">
                    </div>
                    <div>
                        <label class="text-xs block mb-2 font-semibold">Arcos Metálicos (Nave)</label>
                        <input type="range" class="w-full slider" oninput="update('vidrio', this.value)">
                    </div>
                    <div>
                        <label class="text-xs block mb-2 font-semibold">Fábrica de Ladrillo</label>
                        <input type="range" class="w-full slider" oninput="update('arcos', this.value)">
                    </div>
                    <div>
                        <label class="text-xs block mb-2 font-semibold">Zócalo y Accesos</label>
                        <input type="range" class="w-full slider" oninput="update('base', this.value)">
                    </div>
                </div>
            </div>

            <div class="control-card p-4 rounded-xl text-[11px] text-cyan-200 leading-relaxed italic border-l-4 border-cyan-500">
                <i class="fas fa-robot mr-2"></i> <span id="log">Ajuste los sliders para reflejar el avance de la inspección técnica...</span>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center">
            <div class="facade-wrapper shadow-[0_0_100px_rgba(34,211,238,0.1)]">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Fachada_de_1892_de_la_Estaci%C3%B3n_de_Atocha%2C_de_Madrid%2C_Espa%C3%B1a.JPG" class="main-img">
                
                <div id="z-centro" class="zone"></div>
                <div id="z-vidrio" class="zone"></div>
                <div id="z-arcos" class="zone"></div>
                <div id="z-base" class="zone"></div>
            </div>
        </div>
    </div>

    <script>
        const info = {
            centro: "Limpieza química de esculturas de piedra caliza al 70%.",
            vidrio: "Tratamiento anticorrosión en nervios de hierro roblonado.",
            arcos: "Reposición de ladrillo macizo artesanal en muros laterales.",
            base: "Consolidación de sillares de granito en línea de suelo."
        };

        function update(zoneId, value) {
            // Aplicar opacidad a la zona sobre la imagen
            document.getElementById('z-' + zoneId).style.opacity = (value / 100);
            
            // Actualizar log de IA
            document.getElementById('log').innerText = info[zoneId];

            // Calcular total
            let total = 0;
            const sliders = document.querySelectorAll('.slider');
            sliders.forEach(s => total += parseInt(s.value));
            const avg = Math.round(total / sliders.length);
            document.getElementById('global-perc').innerText = avg + '%';

            // Efecto wow final
            if(avg === 100) {
                document.getElementById('global-perc').classList.add('animate-bounce');
                document.getElementById('log').innerHTML = "CERTIFICACIÓN PATRIMONIAL COMPLETADA. PROYECTO CERRADO.";
            }
        }
    </script>
</body>
</html>
